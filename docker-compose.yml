# docker-compose.yml — dev 用 PostgreSQL + MinIO + Stripe Mock を起動する。
# app 本体は `npm run dev` で直起動する前提 (hot reload 維持のため)。
name: next-app-studytracker

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    ports:
      - "54339:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: pgsty/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web コンソール
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/studytracker &&
        mc anonymous set download local/studytracker
      "
    restart: "no"

  stripe-mock:
    image: stripe/stripe-mock:latest
    restart: unless-stopped
    ports:
      - "12111:12111"  # HTTP API
      - "12112:12112"  # HTTPS API
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 12111 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
  miniodata:
